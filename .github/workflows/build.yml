name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install flet skyfield

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Build APK
      run: |
        # Команда --verbose покажет ошибку, если она есть
        # --include-packages принудительно включает skyfield в сборку
        flet build apk --verbose --include-packages skyfield

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: starsis-app
        path: build/apk/app-release.apk
