name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Эта настройка запрещает ломать библиотеку numpy при сборке
    env:
      SERIOUS_PYTHON_NO_STRIP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # ИСПРАВЛЕНИЕ ОШИБКИ 127 И ЛИЦЕНЗИЙ:
      # Используем flutter doctor, он точно установлен
      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        # --include-packages принудительно добавляет skyfield и numpy
        run: flet build apk --verbose --include-packages skyfield numpy sgp4 jplephem certifi platformdirs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starsis-apk
          path: build/apk/app-release.apk
