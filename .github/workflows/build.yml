name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet
          # Устанавливаем skyfield, чтобы pip скачал зависимости
          pip install skyfield

      - name: Build APK
        # Используем --mobile-graphics, чтобы включить поддержку OpenGL
        # И самое главное - НЕ используем --include-packages для numpy,
        # пусть Flet сам попробует найти совместимую версию
        run: flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starsis-apk
          path: build/apk/app-release.apk
