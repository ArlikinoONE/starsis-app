name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04  # Используем более стабильную версию Ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet skyfield

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'  # Стабильная версия Flutter
          channel: stable

      - name: Build APK
        run: |
          flet build apk --verbose
        timeout-minutes: 20  # Увеличиваем время на сборку

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starsis-app
          path: build/apk/app-release.apk
