name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Flet APK
        uses: flet-dev/flet-build@v1
        with:
          python-version: '3.11'
          platforms: 'android'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starsis-apk
          path: build/apk/app-release.apk
