name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # Отключаем "зачистку" numpy, которая ломала сборку
    env:
      SERIOUS_PYTHON_NO_STRIP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # <<< ВОТ ЭТОТ ШАГ РЕШАЕТ ТВОЮ ОШИБКУ
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk --verbose --include-packages skyfield numpy sgp4 jplephem certifi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: starsis-apk
          path: build/apk/app-release.apk
